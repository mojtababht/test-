name: 6-Hour Full Tunnel Auto

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tunnel:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start mhrv-tunnel-node
        run: |
          docker run -d --name mhrv-tunnel \
            -p 8080:8080 \
            -e TUNNEL_AUTH_KEY=dd097efe-c317-49e5-9beb-0ff255ed67ad \
            ghcr.io/therealaleph/mhrv-tunnel-node:latest
          sleep 5
          curl -s http://localhost:8080/health || echo "Waiting for tunnel-node..."
          sleep 5

      - name: Install ngrok
        run: |
          curl -sSL https://ngrok-agent.s3.amazonaws.com/ngrok.asc \
            | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null \
            && echo "deb https://ngrok-agent.s3.amazonaws.com bookworm main" \
            | sudo tee /etc/apt/sources.list.d/ngrok.list \
            && sudo apt update \
            && sudo apt install ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start ngrok and capture URL
        id: expose
        run: |
          ngrok http 8080 --log=stdout > ngrok.log &
          sleep 5
          URL=$(curl -s http://localhost:4040/api/tunnels | python3 -c "import sys,json;print(json.load(sys.stdin)['tunnels'][0]['public_url'])")
          echo "TUNNEL_URL=$URL" >> $GITHUB_OUTPUT
          echo "::notice::Your tunnel URL: $URL"
          echo "::notice::Use this in CodeFull.gs as TUNNEL_SERVER_URL"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Keep alive for 6 hours
        run: |
          sudo apt install npm
          npm install -g @google/clasp
          echo "========================================="
          echo "Tunnel is running!"
          echo "CodeFull.gs TUNNEL_SERVER_URL = ${{ steps.expose.outputs.TUNNEL_URL }}"
          echo "TUNNEL_AUTH_KEY = dd097efe-c317-49e5-9beb-0ff255ed67ad"
          echo "========================================="

          sed -e 's|AUTH_KEY = "AUTH_KEY"|AUTH_KEY = "${{ secrets.AUTH_KEY }}"|g' \
          -e 's|TUNNEL_SERVER_URL = "TUNNEL_SERVER_URL"|TUNNEL_SERVER_URL = "${{ steps.expose.outputs.TUNNEL_URL }}"|g' \
          -e 's|TUNNEL_AUTH_KEY = "TUNNEL_AUTH_KEY"|TUNNEL_AUTH_KEY = "dd097efe-c317-49e5-9beb-0ff255ed67ad"|g' \
          code.gs > code/out_code.gs
          PROJECT_PATH="./code"
          declare -A DEPLOY_IDS=()
          declare -A SCRIPT_IDS=(
            [1]='${{secrets.SCRIPT_ID_ACCOUNT1}}'
            [2]='${{secrets.SCRIPT_ID_ACCOUNT2}}'
            [3]='${{secrets.SCRIPT_ID_ACCOUNT3}}'
            [4]='${{secrets.SCRIPT_ID_ACCOUNT4}}'
            [5]='${{secrets.SCRIPT_ID_ACCOUNT5}}'
          )
          declare -A CLASP_CREDS=(
            [1]="${{secrets.CLASP_CRED_1}}"
            [2]="${{secrets.CLASP_CRED_2}}"
            [3]="${{secrets.CLASP_CRED_3}}"
            [4]="${{secrets.CLASP_CRED_4}}"
            [5]="${{secrets.CLASP_CRED_5}}"
          )
          for acc in {1..5}; do

            echo ${CLASP_CREDS[$acc]}
          
            echo ${CLASP_CREDS[$acc]} > ~/.clasprc.json
          
            cd "$PROJECT_PATH" || exit
          
            cat > .clasp.json <<EOF
          {
            "scriptId": "${SCRIPT_IDS[$acc]}",
            "rootDir": "./code"
          }
          EOF
          
            clasp push -f
          
            DEPLOY_OUTPUT=$(clasp deploy --description "auto $(date '+%Y-%m-%d %H:%M')" 2>&1)
          
            DEPLOY_ID=$(echo "$DEPLOY_OUTPUT" | grep -oP '@\K[0-9]+' | head -1)
          
            echo "Account $acc -> Deploy ID: @$DEPLOY_ID"
            DEPLOY_IDS[$acc]=$DEPLOY_ID
            done
          echo "ids \n"
          for i in {1..5}; do
            echo "$DEPLOY_IDS[$i] \n"
            done
          

          sleep 21000

      - name: Cleanup
        if: always()
        run: |
          docker stop mhrv-tunnel || true
          pkill ngrok || true
